[supervisord]
nodaemon=true
user=root

[program:libvirtd]
startretries=999
command=/usr/sbin/libvirtd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:virtlockd]
startretries=999
command=/usr/sbin/virtlockd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:virtlogd]
startretries=999
command=/usr/sbin/virtlogd
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:hosts]
startretries=999
autostart=true
autorestart=true
command=/usr/bin/hosts-setup.sh
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-1-sushy]
startretries=999
command=/usr/bin/redfish.sh 1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-2-sushy]
startretries=999
command=/usr/bin/redfish.sh 2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-3-sushy]
startretries=999
command=/usr/bin/redfish.sh 3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-1-sushy-host]
startretries=999
command=/usr/bin/dummy-host.sh sushy1 192.168.122.101
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-2-sushy-host]
startretries=999
command=/usr/bin/dummy-host.sh sushy2 192.168.122.102
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:k8s-node-3-sushy-host]
startretries=999
command=/usr/bin/dummy-host.sh sushy3 192.168.122.103
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:image-serve-host]
startretries=999
command=/usr/bin/dummy-host.sh imgsrv 192.168.122.1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
priority=10
autostart=true
autorestart=true
startretries=999
stopsignal=QUIT
stopwaitsecs=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:init-run-dirs]
command=/bin/sh -c "mkdir -p /run/fcgiwrap && chown -R www-data:www-data /run/fcgiwrap"
startsecs=0
priority=1
autostart=true
autorestart=false
startretries=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:fcgiwrap]
; -f = stay in foreground
; -s = socket (unix domain)
command=/usr/sbin/fcgiwrap -f -s unix:/run/fcgiwrap/fcgiwrap.sock
priority=5
user=www-data
autostart=true
autorestart=true
startretries=999
stopsignal=TERM
stopwaitsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:setup-workspace-git-repo]
startretries=999
startsecs=0
command=setup-workspace-git-repo.sh
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
autostart=true
autorestart=false
exitcodes=0

[program:copy-kubeconfigs]
startretries=999
command=/usr/bin/copy-kubeconfigs.sh
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
